# HyperDPI Configuration
# Format: key = value

[dpdk]
# PCI address of network port
pci_addr = 0000:00:08.0
# Number of RX/TX descriptors
nb_rx_desc = 2048
nb_tx_desc = 2048
# Memory pool size
mempool_size = 65535
# Mempool cache size
mempool_cache = 256
# Burst size for RX/TX
burst_size = 32

[lcores]
# Lcore IDs (0 = main, then RX, workers, TX, stats)
rx_lcore = 1
tx_lcore = 2
worker_lcores = 3,4,5,6
stats_lcore = 7

[workers]
# Number of worker threads
nb_workers = 4
# Ring size between RX and workers
rx_worker_ring_size = 131072
# Ring size between workers and TX
tx_ring_size = 131072

[flow_table]
# Maximum number of tracked flows
max_flows = 1048576
# Flow idle timeout (seconds)
flow_timeout = 60

[hyperscan]
# Path to DPI rules file
rules_file = rules/patterns.txt
# Hyperscan mode: HS_MODE_BLOCK or HS_MODE_STREAM
mode = HS_MODE_BLOCK

[stats]
# Stats reporting interval (seconds)
interval = 1
